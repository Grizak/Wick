name: Build & Release Wick
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: |
          set -e
          GOARCH=amd64 GOOS=linux make TARGET=wick-linux_amd64-${GITHUB_REF_NAME}
          GOARCH=amd64 GOOS=windows make TARGET=wick-windows_amd64-${GITHUB_REF_NAME}
          GOARCH=arm64 GOOS=darwin make TARGET=wick-darwin-arm64-${GITHUB_REF_NAME}

      - uses: actions/upload-artifact@v6
        with:
          name: build-produce
          path: build/

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: build-produce
          path: build/

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            build/*
