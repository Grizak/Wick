name: Fetch Tools

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1"

jobs:
  fetch-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cleanup
        run: rm -rf src/tools/bin/linux_amd64

      - name: Download LLC
        run: |
          mkdir -p src/tools/bin/linux_amd64
          sudo apt-get install -y llvm
          cp $(which llc) src/tools/bin/linux_amd64/llc
          chmod +x src/tools/bin/linux_amd64/llc

      - name: Download LLD
        run: |
          sudo apt-get install -y lld
          cp $(which ld.lld) src/tools/bin/linux_amd64/lld
          chmod +x src/tools/bin/linux_amd64/lld

      - name: Write versions
        run: |
          LLC_VERSION=$(llc --version | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?')
          LLD_VERSION=$(ld.lld --version | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?')
          echo "{\"llc\": \"$LLC_VERSION\", \"lld\": \"$LLD_VERSION\"}" > src/tools/bin/linux_amd64/versions.json

      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64-tools
          path: src/tools/bin/linux_amd64/

  fetch-darwin-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cleanup
        run: rm -rf src/tools/bin/darwin_arm64

      - name: Download LLC
        run: |
          mkdir -p src/tools/bin/darwin_arm64
          brew install llvm
          cp $(brew --prefix llvm)/bin/llc src/tools/bin/darwin_arm64/llc
          chmod +x src/tools/bin/darwin_arm64/llc

      - name: Download LLD
        run: |
          brew install lld
          cp $(brew --prefix lld)/bin/ld64.lld src/tools/bin/darwin_arm64/lld
          chmod +x src/tools/bin/darwin_arm64/lld

      - name: Write versions
        run: |
          LLD_PREFIX=$(brew --prefix lld)
          LLVM_PREFIX=$(brew --prefix llvm)
          LLC_VERSION=$($LLVM_PREFIX/bin/llc --version | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?')
          LLD_VERSION=$($LLD_PREFIX/bin/ld64.lld --version | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?')
          echo "{\"llc\": \"$LLC_VERSION\", \"lld\": \"$LLD_VERSION\"}" > src/tools/bin/darwin_arm64/versions.json

      - uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64-tools
          path: src/tools/bin/darwin_arm64/

  fetch-windows-amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cleanup
        run: Remove-Item -Recurse -Force -ErrorAction SilentlyContinue src/tools/bin/windows_amd64

      - name: Get latest LLVM version
        id: llvm-version
        shell: pwsh
        run: |
          $latest = (Invoke-RestMethod "https://api.github.com/repos/llvm/llvm-project/releases/latest").tag_name -replace 'llvmorg-', ''
          echo "version=$latest" >> $env:GITHUB_OUTPUT

      - name: Setup LLVM
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "20.1.0"
          directory: ${{ runner.temp }}/llvm
          cached: false

      - name: Add LLC and LLD to src dir
        shell: pwsh
        run: |
          $LLC_PATH = ${{ runner.temp }}/llvm/bin/llc.exe
          $LLD_PATH = ${{ runner.temp }}/llvm/bin/lld-link.exe
          Write-Host "LLC: $LLC_PATH"
          Write-Host "LLD: $LLD_PATH"
          New-Item -ItemType Directory -Force -Path src/tools/bin/windows_amd64
          Copy-Item $LLC_PATH src/tools/bin/windows_amd64/llc.exe
          Copy-Item $LLD_PATH src/tools/bin/windows_amd64/lld.exe

      - name: Write versions
        shell: pwsh
        run: |
          $LLC_PATH = ${{ runner.temp }}/llvm/bin/llc.exe
          $LLD_PATH = ${{ runner.temp }}/llvm/bin/lld-link.exe
          $LLC_VERSION = (& $LLC_PATH --version) -replace '.*?(\d+\.\d+(\.\d+)?).*', '$1'
          $LLD_VERSION = (& $LLD_PATH --version) -replace '.*?(\d+\.\d+(\.\d+)?).*', '$1'
          "{`"llc`": `"$LLC_VERSION`", `"lld`": `"$LLD_VERSION`"}" | Out-File -FilePath src/tools/bin/windows_amd64/versions.json -Encoding utf8NoBOM

      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64-tools
          path: src/tools/bin/windows_amd64/

  commit:
    needs: [fetch-linux-amd64, fetch-darwin-arm64, fetch-windows-amd64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout master

      - uses: actions/download-artifact@v4
        with:
          name: linux-amd64-tools
          path: src/tools/bin/linux_amd64/

      - uses: actions/download-artifact@v4
        with:
          name: darwin-arm64-tools
          path: src/tools/bin/darwin_arm64/

      - uses: actions/download-artifact@v4
        with:
          name: windows-amd64-tools
          path: src/tools/bin/windows_amd64/

      - name: Commit binaries
        run: |
          git add src/tools/bin/
          if git diff --staged --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit"
          else
            git commit -m "chore: update tool binaries"
            git push origin master
            git checkout dev 2>/dev/null || git checkout -b dev
            git merge master
            git push origin dev
          fi
