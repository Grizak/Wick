name: Fetch Tools

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1"

jobs:
  fetch-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cleanup
        run: rm -rf src/tools/bin/linux_amd64

      - name: Download LLC
        run: |
          mkdir -p src/tools/bin/linux_amd64
          sudo apt-get install -y llvm
          cp $(which llc) src/tools/bin/linux_amd64/llc
          chmod +x src/tools/bin/linux_amd64/llc

      - name: Download LLD
        run: |
          sudo apt-get install -y lld
          cp $(which ld.lld) src/tools/bin/linux_amd64/ld.lld
          chmod +x src/tools/bin/linux_amd64/ld.lld

      - name: Write versions
        run: |
          LLC_VERSION=$(llc --version | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?')
          LLD_VERSION=$(ld.lld --version | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?')
          echo "{\"llc\": \"$LLC_VERSION\", \"lld\": \"$LLD_VERSION\"}" > src/tools/bin/linux_amd64/versions.json

      - uses: actions/upload-artifact@v6
        with:
          name: linux-amd64-tools
          path: src/tools/bin/linux_amd64/

  fetch-darwin-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cleanup
        run: rm -rf src/tools/bin/darwin_arm64

      - name: Download LLC
        run: |
          mkdir -p src/tools/bin/darwin_arm64
          brew install llvm
          cp $(brew --prefix llvm)/bin/llc src/tools/bin/darwin_arm64/llc
          chmod +x src/tools/bin/darwin_arm64/llc

      - name: Download LLD
        run: |
          brew install lld
          cp $(brew --prefix lld)/bin/ld64.lld src/tools/bin/darwin_arm64/ld64.lld
          chmod +x src/tools/bin/darwin_arm64/ld64.lld

      - name: Write versions
        run: |
          LLD_PREFIX=$(brew --prefix lld)
          LLVM_PREFIX=$(brew --prefix llvm)
          LLC_VERSION=$($LLVM_PREFIX/bin/llc --version | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?')
          LLD_VERSION=$($LLD_PREFIX/bin/ld64.lld --version | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?')
          echo "{\"llc\": \"$LLC_VERSION\", \"lld\": \"$LLD_VERSION\"}" > src/tools/bin/darwin_arm64/versions.json

      - uses: actions/upload-artifact@v6
        with:
          name: darwin-arm64-tools
          path: src/tools/bin/darwin_arm64/

  fetch-windows-amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cleanup
        run: Remove-Item -Recurse -Force -ErrorAction SilentlyContinue src/tools/bin/windows_amd64

      - name: Setup msys2 and install llvm
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          install: >
            mingw-w64-x86_64-llvm
            mingw-w64-x86_64-lld

      - name: Copy llc and lld
        shell: msys2 {0}
        run: |
          mkdir -p src/tools/bin/windows_amd64/
          cp /mingw64/bin/llc.exe src/tools/bin/windows_amd64/llc.exe
          cp /mingw64/bin/lld-link.exe src/tools/bin/windows_amd64/lld-link.exe
          chmod +x src/tools/bin/windows_amd64/llc.exe
          chmod +x src/tools/bin/windows_amd64/lld-link.exe

      - name: Write versions
        shell: msys2 {0}
        run: |
          LLC_VERSION=$(/mingw64/bin/llc.exe --version | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?')
          LLD_VERSION=$(/mingw64/bin/lld-link.exe --version | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?')
          echo "{\"llc\": \"$LLC_VERSION\", \"lld\": \"$LLD_VERSION\"}" > src/tools/bin/windows_amd64/versions.json
      - uses: actions/upload-artifact@v6
        with:
          name: windows-amd64-tools
          path: src/tools/bin/windows_amd64/

  commit:
    needs: [fetch-linux-amd64, fetch-darwin-arm64, fetch-windows-amd64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup git
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config pull.rebase false
          git checkout -b chore/update-tools

      - uses: actions/download-artifact@v6
        with:
          name: linux-amd64-tools
          path: src/tools/bin/linux_amd64/

      - uses: actions/download-artifact@v6
        with:
          name: darwin-arm64-tools
          path: src/tools/bin/darwin_arm64/

      - uses: actions/download-artifact@v6
        with:
          name: windows-amd64-tools
          path: src/tools/bin/windows_amd64/

      - name: Commit binaries
        run: |
          set -e
          git add src/tools/bin/
          if git diff --staged --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit"
          else
            git commit -m "chore: update tools"
          fi

          git checkout master
          git pull --no-rebase origin master
          git merge --no-ff chore/update-tools
          git push origin master

          git fetch origin dev
           git checkout -b dev
           git merge --no-ff chore/update-tools
           git pull --rebase origin dev
           git push origin dev

          git branch -D chore/update-tools
