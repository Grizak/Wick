name: Fetch Tools

on:
  workflow_dispatch: # run manually
  schedule:
    - cron: "0 0 * * 1"

jobs:
  fetch-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cleanup
        run: |
          rm -rf src/tools/bin/linux_amd64

      - name: Download NASM
        run: |
          mkdir -p src/tools/bin/linux_amd64
          sudo apt-get install -y nasm
          cp $(which nasm) src/tools/bin/linux_amd64/nasm
          chmod +x src/tools/bin/linux_amd64/nasm

      - name: Download LLD
        run: |
          sudo apt-get install -y lld
          cp $(which ld.lld) src/tools/bin/linux_amd64/lld
          chmod +x src/tools/bin/linux_amd64/lld

      - name: Write versions
        run: |
          NASM_VERSION=$(nasm --version | grep -oP '\d+\.\d+\.\d+')
          LLD_VERSION=$(ld.lld --version | grep -oP '\d+\.\d+\.\d+')
          echo "{\"nasm\": \"$NASM_VERSION\", \"lld\": \"$LLD_VERSION\"}" > src/tools/bin/linux_amd64/versions.json

      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64-tools
          path: src/tools/bin/linux_amd64/

  fetch-darwin-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cleanup
        run: |
          rm -rf src/tools/bin/darwin_arm64

      - name: Download NASM
        run: |
          mkdir -p src/tools/bin/darwin_arm64
          brew install nasm
          cp $(which nasm) src/tools/bin/darwin_arm64/nasm
          chmod +x src/tools/bin/darwin_arm64/nasm

      - name: Download LLD
        run: |
          brew install lld
          cp $(brew --prefix lld)/bin/ld64.lld src/tools/bin/darwin_arm64/lld
          chmod +x src/tools/bin/darwin_arm64/lld

      - name: Write versions
        run: |
          echo "NASM version:"
          nasm --version
          NASM_VERSION=$(nasm --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "NASM_VERSION: $NASM_VERSION"

          echo "LLD prefix:"
          brew --prefix lld
          LLD_PREFIX=$(brew --prefix lld)
          echo "LLD_PREFIX: $LLD_PREFIX"

          echo "LLD binary:"
          ls $LLD_PREFIX/bin/

          echo "LLD version:"
          $LLD_PREFIX/bin/ld64.lld --version
          LLD_VERSION=$($LLD_PREFIX/bin/ld64.lld --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "LLD_VERSION: $LLD_VERSION"

          echo "{\"nasm\": \"$NASM_VERSION\", \"lld\": \"$LLD_VERSION\"}" > src/tools/bin/darwin_arm64/versions.json

      - uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64-tools
          path: src/tools/bin/darwin_arm64/

  fetch-windows-amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cleanup
        run: |
          if (Test-Path src/tools/bin/windows_amd64) {
            Remove-Item -Recurse -Force src/tools/bin/windows_amd64
          }

      - name: Download NASM
        run: |
          mkdir -p src/tools/bin/windows_amd64
          $NASM_VERSION = (Invoke-WebRequest -Uri "https://www.nasm.us/pub/nasm/releasebuilds/" -UseBasicParsing).Links.href `
            | Where-Object { $_ -match '^\d+\.\d+\.\d+/$' } `
            | ForEach-Object { $_ -replace '/$', '' } `
            | Sort-Object { [version]$_ } `
            | Select-Object -Last 1
          Write-Host "Latest NASM version: $NASM_VERSION"
          Invoke-WebRequest -Uri "https://www.nasm.us/pub/nasm/releasebuilds/$NASM_VERSION/win64/nasm-$NASM_VERSION-win64.zip" -OutFile nasm.zip
          Expand-Archive nasm.zip -DestinationPath nasm
          cp nasm/nasm-$NASM_VERSION/nasm.exe src/tools/bin/windows_amd64/nasm.exe

      - name: Download LLD
        run: |
          choco install llvm
          cp "C:\Program Files\LLVM\bin\lld-link.exe" src/tools/bin/windows_amd64/lld.exe

      - name: Write versions
        shell: pwsh
        run: |
          $NASM_VERSION = (& src/tools/bin/windows_amd64/nasm.exe --version) -replace '.*?(\d+\.\d+\.\d+).*', '$1'
          $LLD_VERSION = (& "C:\Program Files\LLVM\bin\lld-link.exe" --version) -replace '.*?(\d+\.\d+\.\d+).*', '$1'
          "{`"nasm`": `"$NASM_VERSION`", `"lld`": `"$LLD_VERSION`"}" | Out-File -FilePath src/tools/bin/windows_amd64/versions.json -Encoding utf8NoBOM

      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64-tools
          path: src/tools/bin/windows_amd64/

  commit:
    needs: [fetch-linux-amd64, fetch-darwin-arm64, fetch-windows-amd64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout master

      - uses: actions/download-artifact@v4
        with:
          name: linux-amd64-tools
          path: src/tools/bin/linux_amd64/

      - uses: actions/download-artifact@v4
        with:
          name: darwin-arm64-tools
          path: src/tools/bin/darwin_arm64/

      - uses: actions/download-artifact@v4
        with:
          name: windows-amd64-tools
          path: src/tools/bin/windows_amd64/

      - name: Commit binaries
        run: |
          git add src/tools/bin/
          git commit -m "chore: update tool binaries"

      - name: Fix branch stuff
        run: |
          git push
          git checkout dev
          git merge master
          git push
