name: Fetch Tools

on:
  workflow_dispatch: # run manually
  release:
    types: [created] # or on new releases

jobs:
  fetch-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download NASM
        run: |
          mkdir -p src/tools/bin/linux_amd64
          sudo apt-get install -y nasm
          cp $(which nasm) src/tools/bin/linux_amd64/nasm
          chmod +x src/tools/bin/linux_amd64/nasm

      - name: Download LLD
        run: |
          sudo apt-get install -y lld
          cp $(which lld) src/tools/bin/linux_amd64/lld
          chmod +x src/tools/bin/linux_amd64/lld

      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64-tools
          path: src/tools/bin/linux_amd64/

  fetch-darwin-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download NASM
        run: |
          mkdir -p src/tools/bin/darwin_arm64
          brew install nasm
          cp $(which nasm) src/tools/bin/darwin_arm64/nasm
          chmod +x src/tools/bin/darwin_arm64/nasm

      - name: Download LLD
        run: |
          brew install lld
          cp $(brew --prefix lld)/bin/lld src/tools/bin/darwin_arm64/lld
          chmod +x src/tools/bin/darwin_arm64/lld

      - uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64-tools
          path: src/tools/bin/darwin_arm64/

  fetch-windows-amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download NASM
        run: |
          mkdir -p src/tools/bin/windows_amd64
          curl -L https://www.nasm.us/pub/nasm/releasebuilds/2.16.03/win64/nasm-2.16.03-win64.zip -o nasm.zip
          Expand-Archive nasm.zip -DestinationPath nasm
          cp nasm/nasm-2.16.03/nasm.exe src/tools/bin/windows_amd64/nasm.exe

      - name: Download LLD
        run: |
          choco install llvm
          cp "C:\Program Files\LLVM\bin\lld.exe" src/tools/bin/windows_amd64/lld.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64-tools
          path: src/tools/bin/windows_amd64/

  commit:
    needs: [fetch-linux-amd64, fetch-darwin-arm64, fetch-windows-amd64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: linux-amd64-tools
          path: src/tools/bin/linux_amd64/

      - uses: actions/download-artifact@v4
        with:
          name: darwin-arm64-tools
          path: src/tools/bin/darwin_arm64/

      - uses: actions/download-artifact@v4
        with:
          name: windows-amd64-tools
          path: src/tools/bin/windows_amd64/

      - name: Commit binaries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/tools/bin/
          git commit -m "chore: update tool binaries"
          git push
